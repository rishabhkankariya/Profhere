name: profhere
description: "ProfHere - Smart Campus Faculty Availability & Consultation Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  # google_fonts removed — using system fonts to reduce app size
  intl: ^0.19.0
  http: ^1.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  file_picker: ^8.1.7
  firebase_core: ^3.11.2
  cloud_firestore: ^5.6.3
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.3.2
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  permission_handler: ^11.3.1
  google_sign_in: ^6.2.2
  another_flushbar: ^1.12.32
  flutter_local_notifications: ^17.1.2
  go_router: ^17.1.0
  uuid: ^4.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  equatable: ^2.0.8
  qr_flutter: ^4.1.0
  home_widget: ^0.9.0
  audioplayers: ^6.1.0
  excel: ^4.0.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.6
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
